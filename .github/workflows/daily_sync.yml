name: Daily ETF Data Sync

on:
  schedule:
    # Runs at 12:00 UTC (8:00 AM EDT) every weekday (Mon-Fri)
    - cron: '0 12 * * 1-5'
  workflow_dispatch: # Adds a button to the GitHub UI so you can trigger it manually

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    # Grants the action permission to push code back to your repo
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R Environment
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install R Packages
        # NOTE: Update this list with any specific packages your data_pipeline.R script needs
        run: |
          install.packages(c("dplyr", "tidyr", "lubridate", "jsonlite", "zoo", "quantmod"))
        shell: Rscript {0}

      - name: Run Data Pipeline
        # Ensure this matches the exact name of your R script
        run: Rscript update_data.R 

      - name: Commit and Push Updated Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/*.json
          # The || echo command prevents the action from failing if the market was closed and data didn't change
          git commit -m "Automated daily ETF data sync" || echo "No changes to commit"
          git push